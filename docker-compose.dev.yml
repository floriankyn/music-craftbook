services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ytdl
      POSTGRES_PASSWORD: ytdl_secret
      POSTGRES_DB: ytdl
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ytdl"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      target: deps
    command: sh -c "npx prisma generate && npm run dev"
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://ytdl:ytdl_secret@postgres:5432/ytdl
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: 1
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    ports:
      - "3000:3000"

volumes:
  pgdata:
  app_node_modules: